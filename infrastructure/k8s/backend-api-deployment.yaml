apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: zillow-roi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: backend-api
          image: zillow-roi/backend-api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: backend-api-config
            - secretRef:
                name: backend-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: zillow-roi
spec:
  selector:
    app: backend-api
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-api-config
  namespace: zillow-roi
data:
  NODE_ENV: "production"
  PORT: "3000"
  PROPERTY_PROVIDER: "rentcast"
  COL_PROVIDER: "teleport"
---
# NOTE: Create this Secret separately with actual values — never commit secrets to source control
# kubectl create secret generic backend-api-secrets -n zillow-roi \
#   --from-literal=DATABASE_URL=... \
#   --from-literal=SESSION_SECRET=... \
#   --from-literal=REDIS_URL=... \
#   --from-literal=REDIS_PASSWORD=... \
#   --from-literal=PROPERTY_API_KEY=... \
#   --from-literal=RENTCAST_API_KEY=... \
#   --from-literal=COL_API_KEY=...
